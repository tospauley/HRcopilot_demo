
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRcopilot | Enterprise Management</title>
    <link rel="icon" type="image/png" href="/HRcopilot_Logo.png">
    <!-- Google Fonts — non-blocking, graceful fallback to system fonts if offline -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" media="print" onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Barlow+Condensed:ital,wght@1,700;1,800;1,900&display=swap">
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Barlow+Condensed:ital,wght@1,700;1,800;1,900&display=swap">
    </noscript>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
      }
    }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-white text-slate-900 transition-colors duration-300">
    <!-- Netlify Forms detection — hidden, never shown to users -->
    <form name="HRcopilot-proposal-request" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <input type="text" name="phone" />
      <input type="text" name="headcount" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
